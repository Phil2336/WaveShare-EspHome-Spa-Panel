## Using Configs from:- https://github.com/runevad/waveshare-esp32-s3-7inch/blob/main/waveshare-esp32-s3-7inch.yaml
## And Post#2 Here:- https://community.home-assistant.io/t/waveshare-esp32-s3-touch-lcd-7/789584/2

substitutions: 
  name: waveshare-1
  friendly_name: Waveshare LCD-1
  id_prefix: Ws1_
  device_sampling_time: 30s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      
psram:
  mode: octal
  speed: 80MHz # Was 120MHz, but wouldn't Compile

################################################################################
# IO Extender
#-------------------------------------------------------------------------------
i2c:
  sda: GPIO08
  scl: GPIO09
  scan: True
  id: bus_a
#-------------------------------------------------------------------------------

# Enable logging
logger:
  level: DEBUG
  logs:
    touch: DEBUG
    display: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret ws1_api_key
ota:
  - platform: esphome
    password: !secret ws1_ota_pass

# IP Reservation:-192.168.59.198
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "WaveShareLcd-1 Fallback"
    password: !secret ws1_ap_pass

web_server:
  version: 3
  include_internal: True

captive_portal:

################################################################################
# IO Extender
#-------------------------------------------------------------------------------
ch422g:
  - id: ch422g_hub

################################################################################
# Switches for Restart & Backlight
#-------------------------------------------------------------------------------
switch:
  - platform: restart
    name: "Restart"
    id: device_restart
  
  - platform: safe_mode
    name: Use Safe Mode
    id: device_safe_mode
    
  - platform: gpio
    id: lcdbacklight
    name: lcdbacklight
    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: false
    restore_mode: ALWAYS_ON

################################################################################
# Touch Screen
#-------------------------------------------------------------------------------
touchscreen:
  platform: gt911
  id: my_touch
  interrupt_pin: GPIO4
  reset_pin:
    ch422g: ch422g_hub
    number: 1
    mode: OUTPUT
  on_touch:
    - lambda: |-
        ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  on_update:
    - lambda: |-
          for (auto touch: touches)  {
              if (touch.state <= 2) {
                ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
              }
          }  

################################################################################
# Display
#-------------------------------------------------------------------------------
display:
  - platform: rpi_dpi_rgb
    id: my_display
    data_pins:
      red: [1, 2, 42, 41, 40]
      green: [39, 0, 45, 48, 47, 21]
      blue: [14, 38, 18, 17, 10]
    de_pin: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: True
    pclk_frequency: 16MHZ
    reset_pin: 
      ch422g: ch422g_hub
      number: 3
    
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 8

    vsync_front_porch: 16
    vsync_pulse_width: 4
    vsync_back_porch: 16

    color_order: RGB
    auto_clear_enabled: false
    update_interval: 30s
    dimensions:
      width: 800
      height: 480

################################################################################
# Fonts
#-------------------------------------------------------------------------------
font:
  - file: "fonts/RobotoCondensed-VariableFont_wght.ttf"
    id: roboto_24
    size: 24
    bpp: 4
  - file: "fonts/RobotoCondensed-VariableFont_wght.ttf"
    id: roboto_36
    size: 36
    bpp: 4
  - file: "fonts/RobotoCondensed-VariableFont_wght.ttf"
    id: roboto_icons_36
    size: 36
    bpp: 4
  - file: "fonts/RobotoCondensed-VariableFont_wght.ttf"
    id: roboto_48
    size: 48
    bpp: 4
  - file: "fonts/RobotoCondensed-VariableFont_wght.ttf"
    id: roboto_icons_100
    size: 100
    bpp: 4
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F02D1", # mdi-heart
          "\U000F05D4", # mdi-airplane-landing
          "\U000F035B", # mdi-memory
          "\U000F0606", # mdi-pool
          ]


################################################################################
# Images
#-------------------------------------------------------------------------------
image:
  - file: img/logo.png
    type: RGB565
    id: logo_image
    resize: 100x100
  - file: "img/light.png"
    id: on_light
    resize: 50x50
    type: RGB565
  - file: "img/small_hum.png"
    id: small_hum
    resize: 50x75
    type: RGB565
  - file: "img/small_logo.png"
    id: small_logo
    resize: 250x52
    type: RGB565
  - file: "img/small_off.png"
    id: small_off
    resize: 50x75
    type: RGB565
  - file: "img/small_temp.png"
    id: small_temp
    resize: 50x75
    type: RGB565
  - file: "img/no_light.png"
    id: no_light
    resize: 50x50
    type: RGB565

################################################################################
