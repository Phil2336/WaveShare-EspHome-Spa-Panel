lvgl:
  theme:
    arc:
      arc_rounded: false
      arc_width: 50
      arc_color: 0xbbbbbb # 0xcccccc
      indicator:
        arc_color: 0x2fff00
        arc_rounded: false
        arc_width: 50

  style_definitions:
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      text_font: montserrat_20
      width: 100%
      height: 30  
    - id: s_lab
      text_color: BLACK
      text_align: CENTER
      text_font: roboto_icons_36
#      width: 240
    - id: s_val
      text_color: BLACK
      text_align: CENTER
      text_font: roboto_48
#      width: 240
  top_layer: 
    widgets:
      - label:
          text: "${devicename}"
          align: top_left
          x: 2
          y: 7
          text_align: left
          text_color: 0xFFFFFF
          text_font: montserrat_20
      - label:
          text: "0db"
          id: wf_sig
          align: top_right
          x: -25
          y: 7
          text_align: right
          text_color: 0xFFFFFF
          text_font: montserrat_20
      - label:
          text: "\uF1EB" # API Status Icon
          id: lbl_hastatus
          hidden: true
          align: top_right
          x: -2
          y: 7
          text_align: right
          text_color: 0xFFFFFF
      - buttonmatrix:
          align: bottom_mid
          styles: header_footer
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: header_footer
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053 Prev"
                on_press:
                  then:
                    - lvgl.page.previous:
                    - script.execute: go_home # Start the timer when leaving main page
              - id: page_home
                text: "\uF015" # Home \uF015"
                on_press:
                  then:
                    lvgl.page.show: main_page
              - id: page_next
                text: "Next \uF054"
                on_press:
                  then:
                    lvgl.page.next:
  
  pages:
    - id: main_page
      bg_image_src: surf
      bg_image_opa: 100% # Use 100% for solid background.Ensure the page itself does not have a solid color covering the background
      bg_opa: 0% # Set page background to transparent
      bg_color: 0x000000
      scrollbar_mode: "OFF"
      scrollable: false
      scroll_dir: none

      widgets:
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "\U000F0606  ESPHome Spa Control Panel  \U000F0606"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: roboto_24
# New Stuff
