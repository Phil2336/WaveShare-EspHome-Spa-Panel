#===== LVGL Spinbox & Buttons for Spa Pump & Solar =================================================
#----- Set Temperature Spin Box --------------------------------------------------------------------
        - obj:
            pad_all: 0
            bg_color: GREEN
            bg_opa: 25%
            border_color: RED # Was CYAN for Testing.
            border_opa: 0
            align: BOTTOM_LEFT
            y: -40 #Was 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: STRETCH # Was CENTER
            width: 300
            height: 60 # Was SIZE_CONTENT then 70
#            align: CENTER
            text_align: CENTER
            text_font: roboto_icons_36
            scrollbar_mode: "OFF"
            scrollable: false

            widgets:
              - button:
                  id: spin_down
                  flex_grow: 1
#                  width: 70
                  height: 60
                  on_click:
                    - lvgl.spinbox.decrement: spinbox_id
                  widgets:
                    - label:
                        text: "-"
                        align: CENTER
              - spinbox:
                  id: spinbox_id
                  align: CENTER
#                  text_align: CENTER
                  flex_grow: 1
#                  width: 70
                  height: 60
#                  text_color: BLACK
                  range_from: 30
                  range_to: 40
                  selected_digit: 0
                  rollover: false
                  digits: 3
                  decimal_places: 1
                  cursor: 
                    bg_opa: transp
                    text_color: BLACK
#                  scrollbar_mode: "OFF"
                  scrollable: false
                  on_value:
                    then:
                      - homeassistant.action:
                          action: input_number.set_value
                          data:
                            entity_id: input_number.spa_set_temp
                            value: !lambda return x;
              - button:
                  id: spin_up
                  flex_grow: 1
                  height: 60
                  on_click:
                    - lvgl.spinbox.increment: spinbox_id
                  widgets:
                    - label:
                        text: "+"
                        align: CENTER
#----- Solar Pump ----------------------------------------------------------------------------------
        - button:
            id: spasolar_but
            #text: "Spa"
            widgets:
              - label:
                  align: CENTER
                  text: "Solar\nPump"
                  text_align: CENTER
            align: bottom_left
            x: 590 # 560
            y: -40 # 380 Was 410
            width: 100
            height: 60 #was 70
            radius: 5
            text_font: roboto_20
            bg_color: red_dull
            text_color: WHITE
            checked: 
              bg_color: 0x2fff00
              text_color: BLACK
            on_click: # on_press Triggers Immediately, on_click Triggers on Release if within defined time frame
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.spa_solar_pump
#----- Spa Pump Button -----------------------------------------------------------------------------
        - button:
            id: spapump_but
            #text: "Spa"
            widgets:
              - label:
                  align: CENTER
                  text_align: CENTER
                  text: "Spa\nPump"
            align: bottom_left
            x: 700 # 680
            y: -40  # 380 # Was 410
            width: 100
            height: 60 # Was 70
            radius: 5
            text_font: roboto_20
            bg_color: red_dull
            text_color: WHITE
            checked: 
              bg_color: 0x2fff00
              text_color: BLACK
            on_click: # on_press Triggers Immediately, on_click Triggers on Release if within time frame
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.energy_3_shed
#----- Derivitive Temp Rise-------------------------------------------------------------------------
        - label:
            id: dtemp_label
            align: bottom_left
            x: 320 # Was 280
            y: -40 # 420 # Was 450
            text: "Hourly Rise..         °C"
            text_font: roboto_24
            text_color: BLACK
        - label:
            id: dtemp_val
            align: bottom_left
            x: 460
            y: -40 # 420 # 450
            text: "##.#"
            text_font: roboto_24
            text_color: BLACK
#----- Right Page --------------------------------------------------------------------------------------------
#  pages:
    - id: right_page
      bg_color: 0x000000
      scrollable: "OFF"
#      widgets:
      widgets:
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "\U000F0606  ESPHome Spa Control Panel Left Page  \U000F0606"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: roboto_24
        - label: 
            x: 160
            y: 180
            text: "Right Page"
            text_color: WHITE
            text_align: CENTER
#----- Brightness control Slider -------------------------------------------------------------------
        - slider:
            id: dimmer_slider
            x: 10
            y: 50
            width: 50
            height: 400
            pad_all: 0
            min_value: 127
            max_value: 255
            value: 128  # Default slider value (50% brightness)
            knob:
              bg_opa: "0%"  # Hides the knob entirely
              radius: 0
            on_value:
              - light.turn_on:
                  id: back_light
                  brightness: !lambda 'return x / 255;'  # Convert 0-255 to 0.0-1.0 for light dimming
              - lvgl.label.update:
                  id: brightness_label
                  text: !lambda |-
                    char buf[32];
                    sprintf(buf, "Brightness: %.0f%%", ((x-127) / 128) * 100);
                    return std::string(buf);

        - label:
            id: brightness_label
            x: 70
            y: 50
            text: "Brightness: 50%"  # Default text
            text_color: WHITE
            text_align: LEFT
            text_font: roboto_icons_36

