display:
  - platform: rpi_dpi_rgb
    id: my_display
    data_pins:
      red: [1, 2, 42, 41, 40]
      green: [39, 0, 45, 48, 47, 21]
      blue: [14, 38, 18, 17, 10]
    de_pin: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: True
    pclk_frequency: 16MHZ
    reset_pin: 
      ch422g: ch422g_hub
      number: 3
    
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 8

    vsync_front_porch: 16
    vsync_pulse_width: 4
    vsync_back_porch: 16

    color_order: RGB
    auto_clear_enabled: false
    update_interval: 30s
    dimensions:
      width: 800
      height: 480