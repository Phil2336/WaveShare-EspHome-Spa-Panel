#----- TV Page --------------------------------------------------------------------------------------------
lvgl:
  pages:
    - id: Right_Tv
      bg_color: BLACK
      scrollable: "OFF"
      widgets:
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "\U000F0606  ESPHome Bbq TV  \U000F0606"
                  align: CENTER
                  text_align: CENTER
                  text_color: WHITE
                  text_font: roboto_24
#----- Container for 1st Row Channel Buttons
        - obj:
            pad_all: 0
            bg_color: GREEN
            bg_opa: 35%
            border_color: RED # Was CYAN for Testing.
            border_opa: 50%
            align: TOP_MID
            bg_grad_dir: NONE
            width: 100%
            height: 25%
            y: 50
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: STRETCH # Was CENTER
            text_align: CENTER
            text_font: roboto_icons_36
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - button:
                  id: Ch_1
                  height: 100%
                  flex_grow: 1
                  widgets:
                    - label:
                        text: "ABC HD\n20"
                        styles: s_rlybtn
                  checked:
                    styles: s_rlybtn_ck
                  on_click: # on_press Triggers Immediately, on_click Triggers on Release if within defined time frame
                    - homeassistant.action:
                        action: media_player.play_media
                        data:
                          entity_id: media_player.ai_pont
                          media_content_id: "20"
                          media_content_type: "channel"
              - button:
                  id: Ch_2
                  height: 100%
                  flex_grow: 1
                  widgets:
                    - label:
                        text: "ABC News\n24"
