#----- Container for Power/Volume Buttons
        - obj:
            pad_all: 0
            bg_color: GREEN
            bg_opa: 35%
            border_color: RED # Was CYAN for Testing.
            border_opa: 50%
            align: BOTTOM_MID
            bg_grad_dir: NONE
            width: 100%
            height: 25%
            y: -50
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: STRETCH # Was CENTER
            text_align: CENTER
            text_font: roboto_icons_36
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - button:
                  id: Tv_pwr
                  height: 100%
                  flex_grow: 1
#                  styles: s_rlybtn
                  widgets:
                    - label:
                        text: "Power\nOn/Off"
                        styles: s_rlybtn
                  checked:
                    styles: s_rlybtn_ck
                  on_click: # on_press Triggers Immediately, on_click Triggers on Release if within defined time frame
                    - homeassistant.action:
                        action: remote.toggle
                        data:
                          entity_id: remote.ai_pont
              - button:
                  id: Tv_vol_dn
                  height: 100%
                  flex_grow: 2
#                  styles: s_rlybtn
                  widgets:
                    - label:
                        text: "Volume\nDown"
                        styles: s_rlybtn
                  checked:
                    styles: s_rlybtn_ck
                  on_click: # on_press Triggers Immediately, on_click Triggers on Release if within defined time frame
                    - homeassistant.action:
                        action: media_player.volume_down
                        data:
                          entity_id: media_player.ai_pont
              - button:
                  id: Tv_vol_up
                  height: 100%
                  flex_grow: 2
#                  styles: s_rlybtn
                  widgets:
                    - label:
                        text: "Volume\nUp"
                        styles: s_rlybtn
                  checked:
                    styles: s_rlybtn_ck
                  on_click: # on_press Triggers Immediately, on_click Triggers on Release if within defined time frame
                    - homeassistant.action:
                        action: media_player.volume_up
                        data:
                          entity_id: media_player.ai_pont
