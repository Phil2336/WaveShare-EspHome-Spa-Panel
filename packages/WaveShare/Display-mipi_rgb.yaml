display:
  - platform: mipi_rgb
    model: ESP32-S3-TOUCH-LCD-7-800X480
    id: my_display

##### Backlight Brightness Controls ################################################################
output:
  - platform: ledc
    pin: GPIO12
#    frequency: 1220
    id: backlight_gpio

light:
  - platform: monochromatic
    output: backlight_gpio
    name: Display Brightness
    id: back_light
    restore_mode: ALWAYS_ON
