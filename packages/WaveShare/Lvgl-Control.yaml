lvgl:
  pages:
    - id: control_page
      bg_color: 0x000000
      scrollable: "OFF"
      widgets:
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "\U000F0606  Display Control Page  \U000F0606"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: roboto_24
        - label: 
            x: 160
            y: 180
            text: "Right Page"
            text_color: WHITE
            text_align: CENTER
        - slider: #----- Brightness control Slider -------------------------------------------------
            id: dimmer_slider
            x: 10
            y: 50
            width: 50
            height: 400
            pad_all: 0
            min_value: 127
            max_value: 255
            value: 128  # Default slider value (50% brightness)
            knob:
              bg_opa: "0%"  # Hides the knob entirely
              radius: 0
            on_value:
              - light.turn_on:
                  id: back_light
                  brightness: !lambda 'return x / 255;'  # Convert 0-255 to 0.0-1.0 for light dimming
              - lvgl.label.update:
                  id: brightness_label
                  text: !lambda |-
                    char buf[32];
                    sprintf(buf, "Brightness: %.0f%%", ((x-127) / 128) * 100);
                    return std::string(buf);
        - label:
            id: brightness_label
            x: 70
            y: 50
            text: "Brightness: 50%"  # Default text
            text_color: WHITE
            text_align: LEFT
            text_font: roboto_icons_36
