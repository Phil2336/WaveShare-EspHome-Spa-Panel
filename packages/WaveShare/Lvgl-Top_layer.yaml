lvgl:
  top_layer: 
    widgets:
      - label:
          text: "${devicename}"
          align: top_left
          x: 2
          y: 7
          text_align: left
          text_color: WHITE
          text_font: montserrat_20
      - label:
          text: "0db"
          id: wf_sig
          align: top_right
          x: -25
          y: 7
          text_align: right
          text_color: WHITE
          text_font: montserrat_20
      - label:
          text: "\uF1EB" # API Status Icon
          id: lbl_hastatus
          hidden: true
          align: top_right
          x: -2
          y: 7
          text_align: right
          text_color: WHITE
      - buttonmatrix:
          align: bottom_mid
          styles: header_footer
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: header_footer
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053 Prev"
                on_press:
                  then:
                    - lvgl.page.previous:
                    - script.execute: go_home # Start the timer when leaving main page
              - id: page_home
                text: "\uF015" # Home \uF015"
                on_press:
                  then:
                    lvgl.page.show: main_page
              - id: page_next
                text: "Next \uF054"
                on_press:
                  then:
                    - lvgl.page.next:
                    - script.execute: go_home # Start the timer when leaving main page
