                  x: 520
                  y: 0
                  value: 0
                  min_value: 0
                  max_value: 5000
              - label: # Gauge Name
                  id: gauge6e_label
                  text: "Total Power"
                  styles: s_lab
                  text_color: WHITE
                  x: 520
                  y: 120
              - label: # Gauge Value
                  id: val6e_text
                  styles: s_val
                  text_color: WHITE
                  x: 520
                  y: 60
                  text: "##.#"